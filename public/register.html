<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Grand Palace Hotel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, rgba(15, 17, 21, 0.4), var(--bg-dark)), url('/images/deluxe.jpg') center/cover;
            padding: 2rem;
        }
        .auth-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeIn 0.8s ease;
        }
        .auth-box h2 {
            margin-bottom: 2rem;
            color: var(--primary);
            font-size: 2rem;
        }
        .row {
            display: flex;
            gap: 1rem;
        }
        .input-group {
            margin-bottom: 1.25rem;
            text-align: left;
            flex: 1;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ddd;
            font-size: 0.9rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.85rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }
        .input-group input:focus {
            border-color: var(--primary);
            background: rgba(0,0,0,0.4);
        }
        .auth-box .btn {
            width: 100%;
            margin-top: 1rem;
        }
        .auth-footer {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #aaa;
        }
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        #error-msg {
            color: #ff4d4d;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        #success-msg {
            color: #4CAF50;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <a href="/" style="text-decoration: none;"><div class="logo" style="margin-bottom: 1rem; font-size:1.2rem;">Grand Palace</div></a>
            <h2>Join Us</h2>
            <div id="error-msg"></div>
            <div id="success-msg"></div>
            <form id="register-form">
                <div class="row">
                    <div class="input-group">
                        <label>First Name</label>
                        <input type="text" id="firstName" required placeholder="John">
                    </div>
                    <div class="input-group">
                        <label>Last Name</label>
                        <input type="text" id="lastName" required placeholder="Doe">
                    </div>
                </div>
                <div class="row">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required placeholder="john@example.com">
                    </div>
                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phoneNo" placeholder="Enter phone number">
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Min. 6 characters" minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" id="reg-btn">Create Account</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="/login.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const phoneNo = document.getElementById('phoneNo').value;
            const password = document.getElementById('password').value;
            
            const btn = document.getElementById('reg-btn');
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');

            btn.textContent = 'Creating...';
            btn.disabled = true;
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, password, phoneNo })
                });

                const data = await response.json();
                
                if (response.ok) {
                    successMsg.textContent = 'Account created successfully! Redirecting...';
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    errorMsg.textContent = data.message || 'Registration failed';
                    errorMsg.style.display = 'block';
                    btn.textContent = 'Create Account';
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
