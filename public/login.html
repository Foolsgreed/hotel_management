<script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
        // 1. Chặn tuyệt đối việc load lại trang hoặc chuyển hướng mặc định
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-msg');

        // 2. Tạo hiệu ứng UI khi đang "xử lý giả"
        const originalText = btn.textContent;
        btn.textContent = 'Logging in...';
        btn.disabled = true;
        errorMsg.style.display = 'none';

        // 3. Giả lập độ trễ mạng 1 giây
        setTimeout(() => {
            // ==============================================================
            // TODO: VAI TRÒ 2 & 4 SẼ THAY THẾ LOGIC GIẢ LẬP NÀY BẰNG FETCH API
            // ==============================================================

            // Giả lập tài khoản mẫu để bạn có thể Demo thành công/thất bại
            if (email === 'guest@gmail.com' && password === '123456') {
                alert('Đăng nhập thành công! (Đây là logic giả lập để Demo giao diện)');

                // Ở bản Final sẽ chuyển trang, nhưng ở bản Demo này ta giữ nguyên trang
                // để tránh lỗi trắng xóa khi chưa có Backend.
                console.log('User data saved to local (Demo Only)');
            } else {
                // Hiển thị lỗi ngay trên trang hiện tại
                errorMsg.textContent = 'Email hoặc mật khẩu không đúng (Dùng: guest@gmail.com / 123456)';
                errorMsg.style.display = 'block';
            }

            // 4. QUAN TRỌNG: Trả lại trạng thái nút bấm để không bị kẹt
            btn.textContent = originalText;
            btn.disabled = false;

        }, 1000);
    });
</script>
